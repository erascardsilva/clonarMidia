name: clonarmidia
base: core22
version: '1.0.0'
title: ClonarMidia
summary: Clonagem bit-a-bit e recuperação de dados profissional.
description: |
  O Clonar Mídia é uma ferramenta de baixo nível desenvolvida por Erasmo Cardoso 
  para processos de clonagem forense, recuperação de arquivos deletados e 
  reparo de sistemas de arquivos corrompidos.

grade: stable
confinement: strict
icon: snap/gui/clonarmidia.png

apps:
  clonarmidia:
    command: bin/clonarmidia
    extensions: [gnome]
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - udisks2
      - raw-usb
      - home
      - network
      - network-bind

parts:
  clonarmidia:
    plugin: nil
    source: .
    override-build: |
      # Build do Frontend
      cd frontend && npm install && npm run build
      cd ..
      
      # Build do Wails
      wails build -o clonarmidia
      
      # Instalação dos binários conforme padrão
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp clonarmidia $SNAPCRAFT_PART_INSTALL/bin/
      
      # Blindagem dos assets de GUI conforme regras do Erasmo
      mkdir -p $SNAPCRAFT_PART_INSTALL/gui
      cp snap/gui/*.png $SNAPCRAFT_PART_INSTALL/gui/
      cp snap/gui/*.desktop $SNAPCRAFT_PART_INSTALL/gui/

    build-packages:
      - golang-go
      - npm
      - libgtk-3-dev
      - libwebkit2gtk-4.0-dev

  external-tools:
    plugin: nil
    stage-packages:
      - testdisk
      - e2fsprogs
      - smartmontools
