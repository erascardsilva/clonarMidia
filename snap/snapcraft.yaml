name: clonarmidia
base: core22
version: '1.0.0'
summary: Ferramenta de clonagem de discos e recuperação de dados
description: |
  Aplicativo desktop que permite clonar discos, partições, recuperar arquivos
  com TestDisk/PhotoRec e analisar a saúde S.M.A.R.T. desenvolvido por
  Erasmo Cardoso - Software Engineer | Electronics Technician.
confinement: strict
grade: stable
title: Clonar Mídia
license: MIT
contact: https://github.com/erascardsilva/clonarMidia/issues
website: https://github.com/erascardsilva/clonarMidia
source-code: https://github.com/erascardsilva/clonarMidia
issues: https://github.com/erascardsilva/clonarMidia/issues

apps:
  clonarmidia:
    command: $SNAP/build/bin/clonarmidia
    extensions: [gnome]
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
    plugs:
      - home
      - network
      - opengl
      - wayland
      - x11
      - removable-media

parts:
  clonarmidia:
    plugin: nil
    source: .
    build-packages:
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - pkg-config
    build-snaps:
      - go/1.22/stable
      - node/20/stable
    stage-packages:
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
      - libgl1-mesa-glx
      - libgl1-mesa-dri
      - libegl1-mesa
      - libgbm1
      - mesa-utils
    override-build: |
      export GOPATH=$HOME/go
      export PATH=$HOME/go/bin:/usr/local/bin:$PATH
      
      # Instala a CLI do Wails com a versão de Go do snap
      go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      # Build da aplicação (frontend + backend)
      wails build -clean
      
      # Copia o binário para o diretório do snap
      mkdir -p $SNAPCRAFT_PART_INSTALL/build/bin
      cp build/bin/clonarmidia $SNAPCRAFT_PART_INSTALL/build/bin/
