name: clonarmidia
base: core24
version: '1.0.0'
summary: Ferramenta de clonagem de discos e recuperação de dados
description: |
  Aplicativo desktop que permite clonar discos, partições, recuperar arquivos
  com TestDisk/PhotoRec e analisar a saúde S.M.A.R.T. desenvolvido por
  Erasmo Cardoso - Software Engineer | Electronics Technician.
icon: snap/gui/clonarmidia.png
contact: https://github.com/erascardsilva/clonarMidia/issues
issues: https://github.com/erascardsilva/clonarMidia/issues
license: MIT
donation: https://github.com/sponsors/erascardsilva
website: https://github.com/erascardsilva/clonarMidia
source-code: https://github.com/erascardsilva/clonarMidia

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  clonarmidia:
    command: bin/clonarmidia
    extensions: [gnome]
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
    plugs:
      - home
      - network
      - opengl
      - wayland
      - x11
      - removable-media
      - desktop
      - desktop-legacy
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe
      - udisks2

parts:
  clonarmidia:
    plugin: nil
    source: .
    build-snaps:
      - go/1.22/stable
      - node/20/stable
    build-packages:
      - build-essential
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
    override-build: |
      # Instala a CLI do Wails
      go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Instala dependências do frontend
      npm install --prefix frontend

      # Build da aplicação via Wails
      $HOME/go/bin/wails build -m -tags webkit2_41 -nsis=false -upx=false -trimpath -o clonarmidia

      # Organiza o binário final
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp build/bin/clonarmidia $CRAFT_PART_INSTALL/bin/
