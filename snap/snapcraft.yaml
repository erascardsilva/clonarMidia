name: clonarmidia
base: core22
version: '1.0.0'
title: ClonarMidia
summary: Clonagem bit-a-bit e recuperação de dados profissional.
description: |
  O Clonar Mídia é uma ferramenta de baixo nível desenvolvida por Erasmo Cardoso 
  para processos de clonagem forense, recuperação de arquivos deletados e 
  reparo de sistemas de arquivos corrompidos.

grade: stable
confinement: strict
icon: snap/gui/clonarmidia.png

apps:
  clonarmidia:
    command: bin/clonarmidia
    extensions: [gnome]
    plugs:
      - hardware-observe
      - mount-observe
      - udisks2
      - home
      - network
      - network-bind

parts:
  clonarmidia:
    plugin: nil
    source: .
    override-build: |
      # Instala Go 1.23 (golang-go do apt é incompatível com Wails v2.12+)
      curl -sL https://go.dev/dl/go1.23.0.linux-amd64.tar.gz | tar -C /usr/local -xz
      export PATH=$PATH:/usr/local/go/bin
      export GOPATH=/root/go
      export PATH=$PATH:$GOPATH/bin

      # Instala o Wails
      go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Build do Frontend
      cd frontend && npm install && npm run build
      cd ..

      # Build do Wails (gera binário em build/bin/)
      wails build

      # Cópia dos binários conforme padrão
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp build/bin/clonarmidia $SNAPCRAFT_PART_INSTALL/bin/

      # Cópia manual de assets de GUI conforme padrão Erasmo
      mkdir -p $SNAPCRAFT_PART_INSTALL/gui
      cp snap/gui/*.png $SNAPCRAFT_PART_INSTALL/gui/
      cp snap/gui/*.desktop $SNAPCRAFT_PART_INSTALL/gui/

    build-packages:
      - curl
      - npm
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
    stage-packages:
      - testdisk
      - e2fsprogs
      - smartmontools
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
- libcanberra-gtk3-module   # módulo GTK 3 compatível, corrige o erro de carregamento
