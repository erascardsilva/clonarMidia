name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Full Version (.deb)
        run: |
          # Build do binário e pacote .deb nativo do Wails
          export PATH=$PATH:$(go env GOPATH)/bin
          npm install --prefix frontend
          wails build -m -tags webkit2_41 -platform linux/amd64 -package
          
          # Move para pasta de artefatos
          mkdir -p artifacts
          cp build/bin/*.deb artifacts/ || true
          cp build/bin/clonarmidia artifacts/clonarmidia-linux-amd64

      - name: Generate RPM
        run: |
          # Usaremos o fpm para gerar o RPM a partir do binário
          sudo gem install fpm
          fpm -s dir -t rpm -n clonarmidia -v 1.0.0 \
            --description "Professional disk cloning and recovery tool" \
            --license "MIT" \
            --maintainer "Erasmo Cardoso" \
            --url "https://github.com/erascardsilva/clonarMidia" \
            build/bin/clonarmidia=/usr/bin/clonarmidia
          
          mv *.rpm artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clonarmidia-linux-packages
          path: artifacts/*

  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1

      - name: Publish Snap (Demo)
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge
