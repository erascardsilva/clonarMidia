name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config rpm ruby-dev rubygems

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          npm install --prefix frontend
          wails build -m -tags webkit2_41 -platform linux/amd64 -o clonarmidia
          
          # Garante que a pasta de artefatos existe
          mkdir -p artifacts
          cp build/bin/clonarmidia artifacts/clonarmidia-linux-amd64

      - name: Install FPM
        run: sudo gem install --no-document fpm

      - name: Package .deb and .rpm
        run: |
          # Gera o DEB
          fpm -s dir -t deb -n clonarmidia -v 1.0.0 \
            --description "Professional disk cloning and recovery tool" \
            --license "MIT" \
            --maintainer "Erasmo Cardoso" \
            --depends "libgtk-3-0" \
            --depends "libwebkit2gtk-4.1-0" \
            build/bin/clonarmidia=/usr/bin/clonarmidia \
            snap/gui/clonarmidia.png=/usr/share/icons/hicolor/512x512/apps/clonarmidia.png
          
          # Gera o RPM
          fpm -s dir -t rpm -n clonarmidia -v 1.0.0 \
            --description "Professional disk cloning and recovery tool" \
            --license "MIT" \
            --maintainer "Erasmo Cardoso" \
            --depends "gtk3" \
            --depends "webkit2gtk4.1" \
            build/bin/clonarmidia=/usr/bin/clonarmidia \
            snap/gui/clonarmidia.png=/usr/share/icons/hicolor/512x512/apps/clonarmidia.png
          
          mv *.deb artifacts/
          mv *.rpm artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clonarmidia-linux-packages
          path: artifacts/*

  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish Snap (Demo)
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge
