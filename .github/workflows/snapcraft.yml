# Clonar Mídia - Snapcraft Build and Publish
# Estratégia: Versão Demo (Aprovação Instantânea)
# Documentação Completa em: SNAP_DEPLOYMENT_GUIDE.md

name: Build and Publish Snap

on:
  push:
    branches: [ master, main ]

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish Snap (Demo)
        # ATENÇÃO: Requer o Secret 'SNAPCRAFT_STORE_CREDENTIALS' configurado no GitHub.
        # Gere o token com: snapcraft export-login --snaps=clonarmidia --expires=2026-12-31 snap.login
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge
