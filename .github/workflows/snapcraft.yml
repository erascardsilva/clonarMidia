name: Snapcraft Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libcanberra-gtk3-module pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Snapcraft and Base
        run: |
          sudo snap install snapcraft --classic
          sudo snap install core22

      - name: Prepare snapcraft.yaml
        run: cp snap/snapcraft.yaml ./snapcraft.yaml

      - name: Build Snap
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # Força o uso do binário Go/Node instalados pelo Action em vez de tentar baixar snaps
          snapcraft pack --destructive-mode

      - name: Identify Snap file
        id: snap_info
        run: echo "SNAP_NAME=$(ls *.snap | head -n 1)" >> $GITHUB_ENV

      - name: Publish Snap
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ env.SNAP_NAME }}
          release: edge
